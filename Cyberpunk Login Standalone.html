  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

solute;top:0;right:22px;width:0;height:0;border-top:22px solid #2a0000;border-left:22px solid transparent;pointer-events:none;\"><\u002Fdiv>\n          <div style=\"position:absolute;bottom:0;left:22px;width:0;height:0;border-bottom:22px solid #2a0000;border-right:22px solid transparent;pointer-events:none;\"><\u002Fdiv>\n\n          <!-- Inner red accent line top -->\n          <div style=\"position:absolute;top:0;left:0;right:22px;height:1px;background:linear-gradient(90deg,rgba(200,0,0,0.4),transparent);pointer-events:none;\"><\u002Fdiv>\n\n          <!-- ◆ NEURAL LINK ID -->\n          <div style=\"margin-bottom:21px;\">\n            <div style=\"font-size:8px;letter-spacing:0.45em;color:#773333;margin-bottom:7px;display:flex;align-items:center;gap:6px;\">\n              <span style=\"display:inline-block;width:5px;height:5px;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);background:#cc0000;flex-shrink:0;\"><\u002Fspan>\n              {{ labelUsername }}\n            <\u002Fdiv>\n            <div style=\"height:42px;background:#040202;border:1px solid #1d0000;clip-path:polygon(0 0,calc(100% - 9px) 0,100% 9px,100% 100%,0 100%);display:flex;align-items:center;padding:0 13px;gap:0;\">\n              <span style=\"color:#bb5050;font-size:12px;letter-spacing:0.13em;flex:1;min-width:0;overflow:hidden;\">{{ usernameDisplay }}<\u002Fspan>\n              <span style=\"{{ uCursorStyle }}\"><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- ◆ ACCESS CODE -->\n          <div style=\"margin-bottom:25px;\">\n            <div style=\"font-size:8px;letter-spacing:0.45em;color:#773333;margin-bottom:7px;display:flex;align-items:center;gap:6px;\">\n              <span style=\"display:inline-block;width:5px;height:5px;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%);background:#cc0000;flex-shrink:0;\"><\u002Fspan>\n              {{ labelPassword }}\n            <\u002Fdiv>\n            <div style=\"height:42px;background:#040202;border:1px solid #1d0000;clip-path:polygon(0 0,calc(100% - 9px) 0,100% 9px,100% 100%,0 100%);display:flex;align-items:center;padding:0 13px;gap:0;\">\n              <span style=\"color:#bb5050;font-size:13px;letter-spacing:0.22em;flex:1;min-width:0;overflow:hidden;\">{{ passwordDisplay }}<\u002Fspan>\n              <span style=\"{{ pCursorStyle }}\"><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- AUTHENTICATING progress section -->\n          <div style=\"{{ authSectionStyle }}\">\n            <div style=\"display:flex;justify-content:space-between;font-size:8px;letter-spacing:0.36em;color:#773333;margin-bottom:8px;\">\n              <span>AUTHENTICATING...<\u002Fspan>\n              <span style=\"color:#cc4444;font-variant-numeric:tabular-nums;\">{{ authProgress }}%<\u002Fspan>\n            <\u002Fdiv>\n            <!-- Segmented progress bar -->\n            <div style=\"height:11px;background:#0e0000;position:relative;overflow:hidden;clip-path:polygon(3px 0,100% 0,calc(100% - 3px) 100%,0 100%);\">\n              <div style=\"{{ progressFillStyle }}\"><\u002Fdiv>\n              <div style=\"position:absolute;top:0;right:0;bottom:0;left:0;background:repeating-linear-gradient(90deg,transparent 0,transparent calc(100%/22 - 1.5px),rgba(5,2,2,0.8) calc(100%/22 - 1.5px),rgba(5,2,2,0.8) calc(100%/22));pointer-events:none;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <!-- Sub-status text -->\n            <div style=\"font-size:7px;letter-spacing:0.3em;color:#3d1414;margin-top:7px;\">VERIFYING NEURAL SIGNATURE... CROSS-REFERENCING DATABASE...<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- AUTHENTICATE button -->\n          <div style=\"{{ btnSectionStyle }}\">\n            <div style=\"height:46px;border:1px solid #6e1c1c;clip-path:polygon(0 0,calc(100% - 13px) 0,100% 13px,100% 100%,13px 100%,0 calc(100% - 13px));display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;\" style-hover=\"background:#130000;border-color:#cc0000;box-shadow:0 0 20px rgba(180,0,0,0.2);\">\n              <span style=\"font-size:10px;letter-spacing:0.55em;color:#a03030;padding-right:0.55em;\" style-hover=\"color:#cc0000;text-shadow:0 0 12px #cc0000;\">AUTHENTICATE<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n\n        <!-- Footer info -->\n        <div style=\"display:flex;justify-content:space-between;margin-top:9px;font-size:7px;letter-spacing:0.22em;color:#1e0a0a;\">\n          <span>WATSON // NC-07<\u002Fspan>\n          <span>AES-256 // RSA-4096<\u002Fspan>\n          <span>PORT // 4471<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ── ACCESS GRANTED overlay ── -->\n    <div style=\"{{ grantedStyle }}\">\n      <!-- Horizontal accent lines -->\n      <div style=\"width:360px;height:1px;background:linear-gradient(90deg,transparent,#cc0000 25%,#cc0000 75%,transparent);margin-bottom:28px;opacity:0.7;\"><\u002Fdiv>\n      <div style=\"font-family:'Orbitron',sans-serif;font-size:54px;font-weight:900;color:#cc0000;letter-spacing:0.48em;padding-right:0.48em;line-height:1.05;animation:redGlow 0.5s ease-in-out infinite;animation:grantedPulse 1.2s ease-in-out infinite;\">ACCESS<\u002Fdiv>\n      <div style=\"font-family:'Orbitron',sans-serif;font-size:54px;font-weight:900;color:#cc0000;letter-spacing:0.48em;padding-right:0.48em;line-height:1.05;animation:grantedPulse 1.2s ease-in-out infinite .6s;margin-top:4px;\">GRANTED<\u002Fdiv>\n      <div style=\"width:360px;height:1px;background:linear-gradient(90deg,transparent,#cc0000 25%,#cc0000 75%,transparent);margin-top:28px;opacity:0.7;\"><\u002Fdiv>\n      <div style=\"font-size:9px;color:#6a3030;letter-spacing:0.58em;margin-top:18px;animation:redGlow 1.4s ease-in-out infinite;\">IDENTITY VERIFIED // LOADING PROFILE...<\u002Fdiv>\n      <!-- Sub-details -->\n      <div style=\"margin-top:10px;font-size:7px;letter-spacing:0.3em;color:#330e0e;\">USER: KIRA_7731-NC // CLEARANCE: LEVEL-4 // SESSION: ACTIVE<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  _cancelled = false;\n  _timers = [];\n\n  state = {\n    phase: 'boot',\n    bootLines: [],\n    usernameDisplay: '',\n    passwordDisplay: '',\n    authProgress: 0,\n    glitchFrame: 0,\n    redFlash: false,\n    labelUsername: '',\n    labelPassword: '',\n    clockText: '--:--:--',\n    elapsed: 0,\n  };\n\n  componentDidMount() {\n    this._tick();\n    this.clockInterval = setInterval(() => this._tick(), 1000);\n    this.elapsedInterval = setInterval(() => {\n      if (!this._cancelled) this.setState(s => ({ elapsed: s.elapsed + 1 }));\n    }, 1000);\n    this.runAnimation();\n  }\n\n  componentWillUnmount() {\n    this._cancelled = true;\n    this._timers.forEach(clearTimeout);\n    clearInterval(this.clockInterval);\n    clearInterval(this.elapsedInterval);\n  }\n\n  _tick() {\n    if (this._cancelled) return;\n    const n = new Date();\n    const p = v => String(v).padStart(2, '0');\n    this.setState({ clockText: `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}` });\n  }\n\n  wait(ms) {\n    return new Promise(resolve => {\n      if (this._cancelled) return resolve();\n      const id = setTimeout(resolve, ms);\n      this._timers.push(id);\n    });\n  }\n\n  go(s) {\n    if (!this._cancelled) this.setState(s);\n  }\n\n  async runAnimation() {\n    while (!this._cancelled) {\n      await this.doBoot();\n      if (this._cancelled) return;\n      await this.doForm();\n      if (this._cancelled) return;\n      await this.doAuth();\n      if (this._cancelled) return;\n      await this.doGranted();\n    }\n  }\n\n  async doBoot() {\n    this.go({\n      phase: 'boot', bootLines: [], usernameDisplay: '',\n      passwordDisplay: '', authProgress: 0, glitchFrame: 0,\n      redFlash: false, labelUsername: '', labelPassword: '',\n    });\n    await this.wait(200);\n    const lines = [\n      'BIOS v9.4.1 \\u25b8 ARASAKA NEURAL OS',\n      'INITIALIZING CORTEX INTERFACE...',\n      'LOADING SECURITY PROTOCOLS [OK]',\n      'ENCRYPTION: AES-256 / RSA-4096 [ACTIVE]',\n      'BIO-SCANNER: OFFLINE \\u25b8 FALLBACK ENABLED',\n      'GRID NODE: NC-WATSON-07 [ONLINE]',\n      'AUTH SERVER: 192.168.44.1 [REACHABLE]',\n      'FIREWALL: ACTIVE \\u25b8 17-LAYER DEFENSE',\n      'THREAT ASSESSMENT: MODERATE',\n      '\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500\\u2500',\n      '\\u25b8 IDENTITY VERIFICATION REQUIRED',\n      '\\u25b8 LOADING SECURE INPUT MODULE...',\n    ];\n    for (const line of lines) {\n      if (this._cancelled) return;\n      await this.wait(145 + Math.random() * 95);\n      this.go(s => ({ bootLines: [...s.bootLines, line] }));\n    }\n    await this.wait(620);\n  }\n\n  async doForm() {\n    this.go({ phase: 'form' });\n    await this.wait(380);\n    await this.decrypt('labelUsername', 'NEURAL LINK ID');\n    await this.wait(115);\n    await this.decrypt('labelPassword', 'ACCESS CODE');\n    await this.wait(870);\n    await this.type('usernameDisplay', 'KIRA_7731-NC');\n    await this.wait(370);\n    await this.type('passwordDisplay', '\\u2022\\u2022\\u2022\\u2022\\u2022\\u2022\\u2022\\u2022\\u2022\\u2022\\u2022\\u2022\\u2022\\u2022\\u2022\\u2022');\n    await this.wait(780);\n  }\n\n  async decrypt(field, target) {\n    const g = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$!?%&*';\n    for (let i = 0; i <= target.length; i++) {\n      if (this._cancelled) return;\n      const partial = target.slice(0, i);\n      const rand = Array.from({ length: target.length - i }, () =>\n        g[Math.floor(Math.random() * g.length)]\n      ).join('');\n      this.go({ [field]: partial + rand });\n      await this.wait(50);\n    }\n    this.go({ [field]: target });\n  }\n\n  async type(field, text) {\n    for (let i = 0; i <= text.length; i++) {\n      if (this._cancelled) return;\n      this.go({ [field]: text.slice(0, i) });\n      await this.wait(68 + Math.random() * 52);\n    }\n  }\n\n  async doAuth() {\n    this.go({ phase: 'auth', authProgress: 0 });\n    let p = 0;\n    while (p < 100) {\n      if (this._cancelled) return;\n      await this.wait(74 + Math.random() * 56);\n      p = Math.min(100, p + Math.random() * 4.5 + 0.4);\n      this.go({ authProgress: p });\n    }\n    await this.wait(420);\n  }\n\n  async doGranted() {\n    this.go({ phase: 'granted', redFlash: true });\n    await this.wait(135);\n    this.go({ redFlash: false });\n    // Random glitch pulses\n    for (let i = 0; i < 7; i++) {\n      if (this._cancelled) return;\n      await this.wait(100 + Math.random() * 360);\n      this.go({ glitchFrame: Math.floor(Math.random() * 5) + 1 });\n      await this.wait(50 + Math.random() * 100);\n      this.go({ glitchFrame: 0 });\n    }\n    await this.wait(2000);\n    this.go({ phase: 'fadeout' });\n    await this.wait(2500);\n  }\n\n  renderVals() {\n    const {\n      phase, bootLines, usernameDisplay, passwordDisplay,\n      authProgress, glitchFrame, redFlash,\n      labelUsername, labelPassword, clockText, elapsed,\n    } = this.state;\n\n    const showForm = phase !== 'boot';\n    const showAuth = phase === 'auth' || phase === 'granted' || phase === 'fadeout';\n    const showGranted = phase === 'granted' || phase === 'fadeout';\n    const isFadeout = phase === 'fadeout';\n\n    const gx = glitchFrame > 0 ? (glitchFrame % 2 ? 1 : -1) * glitchFrame * 4 : 0;\n    const gy = glitchFrame > 0 ? (glitchFrame % 3 ? 1 : -1) * 2 : 0;\n\n    const statusMap = {\n      boot: 'INITIALIZING',\n      form: 'AWAITING INPUT',\n      auth: 'PROCESSING',\n      granted: 'AUTHORIZED',\n      fadeout: 'AUTHORIZED',\n    };\n\n    const abs = { position: 'absolute', top: 0, right: 0, bottom: 0, left: 0 };\n    const centered = { display: 'flex', alignItems: 'center', justifyContent: 'center' };\n\n    return {\n      phase,\n      bootLines,\n      usernameDisplay,\n      passwordDisplay,\n      labelUsername,\n      labelPassword,\n      authProgress: Math.round(authProgress),\n      clockText,\n      elapsed,\n      screenLabel: `${phase.toUpperCase()} [${elapsed}s]`,\n      statusText: statusMap[phase] || 'STANDBY',\n\n      bootStyle: {\n        ...abs, ...centered,\n        opacity: phase === 'boot' ? 1 : 0,\n        transition: 'opacity 0.9s ease-out',\n        pointerEvents: phase === 'boot' ? 'auto' : 'none',\n      },\n\n      formStyle: {\n        ...abs, ...centered,\n        opacity: showForm ? 1 : 0,\n        transform: showForm ? 'translateY(0)' : 'translateY(30px)',\n        transition: 'opacity 0.75s ease-out, transform 0.75s cubic-bezier(0.16,1,0.3,1)',\n        pointerEvents: showForm ? 'auto' : 'none',\n      },\n\n      grantedStyle: {\n        ...abs, ...centered,\n        flexDirection: 'column',\n        textAlign: 'center',\n        opacity: showGranted ? 1 : 0,\n        transform: `translate(${gx}px, ${gy}px)`,\n        transition: 'opacity 0.4s ease-out',\n        pointerEvents: 'none',\n      },\n\n      flashStyle: {\n        ...abs,\n        background: 'rgba(200,0,0,0.9)',\n        opacity: redFlash ? 1 : 0,\n        transition: 'opacity 0.13s',\n        pointerEvents: 'none',\n        zIndex: 200,\n      },\n\n      fadeStyle: {\n        ...abs,\n        background: '#000',\n        opacity: isFadeout ? 1 : 0,\n        transition: 'opacity 2.2s ease-in',\n        pointerEvents: 'none',\n        zIndex: 199,\n      },\n\n      authSectionStyle: {\n        opacity: showAuth ? 1 : 0,\n        transition: 'opacity 0.45s',\n        marginBottom: '20px',\n      },\n\n      btnSectionStyle: {\n        opacity: showAuth ? 0 : 1,\n        transition: 'opacity 0.3s',\n        pointerEvents: showAuth ? 'none' : 'auto',\n      },\n\n      progressFillStyle: {\n        position: 'absolute', top: 0, left: 0,\n        height: '100%',\n        width: Math.round(authProgress) + '%',\n        background: '#cc0000',\n        transition: 'width 0.09s linear',\n        animation: 'progressGlow 1.1s ease-in-out infinite',\n      },\n\n      uCursorStyle: {\n        display: 'inline-block',\n        width: '7px', height: '16px',\n        background: '#cc0000',\n        flexShrink: 0,\n        animation: 'blink 1s step-end infinite',\n        opacity: showForm && !showAuth ? 1 : 0,\n        transition: 'opacity 0.3s',\n      },\n\n      pCursorStyle: {\n        display: 'inline-block',\n        width: '7px', height: '16px',\n        background: '#cc0000',\n        flexShrink: 0,\n        animation: 'blink 1s step-end infinite',\n        opacity: showForm && !showAuth && passwordDisplay.length > 0 ? 1 : 0,\n        transition: 'opacity 0.3s',\n      },\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
